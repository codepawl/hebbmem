name: Release Check

on:
  push:
    tags: ["v*"]

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package version
        env:
          TAG_REF: ${{ github.ref }}
        run: |
          TAG_VERSION="${TAG_REF#refs/tags/v}"
          PKG_VERSION=$(grep -m1 'version' pyproject.toml | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag v$TAG_VERSION does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi
          echo "Version match: v$TAG_VERSION"
